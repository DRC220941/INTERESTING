name: CI 
on: 
  push: 
    branches: [ main ] 
jobs: 
  test: 
    runs-on: ubuntu-latest 
    steps: 
    - uses: actions/checkout@v4 
    - uses: actions/setup-python@v5 
      with: 
        python-version: '3.11' 
    - name: Install package 
      run: pip install -e . 
    - name: Run tests 
      run: |
        export PYTHONPATH=$GITHUB_WORKSPACE
        python -m pytest src/tests/ -v
