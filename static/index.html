<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moteur de Prédiction de Multiplicateurs</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Moteur de Prédiction de Multiplicateurs</h1>
            <p class="subtitle">Saisissez des valeurs pour obtenir des prédictions basées sur 3 modèles.</p>
        </header>

        <!-- Formulaire -->
        <div class="card">
            <h2>🔢 Saisir des multiplicateurs</h2>
            <form id="predictForm">
                <div class="input-group">
                    <input type="text" id="valuesInput"
                           placeholder="Ex: 1.5, 2.0, 1.8, 3.0, 2.5"
                           required>
                    <button type="submit" class="btn-primary">Prédire</button>
                </div>
            </form>
        </div>

        <!-- Résultats -->
        <div class="card" id="resultsCard" style="display: none;">
            <h2>📈 Résultats</h2>
            <div class="results-grid">
                <div class="result-item">
                    <h3>Prédictions</h3>
                    <div id="predictions" class="result-value"></div>
                </div>
                <div class="result-item">
                    <h3>Confiances</h3>
                    <div id="confidences" class="result-value"></div>
                </div>
                <div class="result-item">
                    <h3>Dernière valeur</h3>
                    <div id="lastValue" class="result-value"></div>
                </div>
                <div class="result-item">
                    <h3>Moyenne</h3>
                    <div id="meanValue" class="result-value"></div>
                </div>
            </div>
            <div id="warnings" class="warnings"></div>
            <div class="chart-container">
                <canvas id="chart"></canvas>
            </div>
        </div>

        <!-- Détails des modèles -->
        <div class="card" id="modelsCard" style="display: none;">
            <h2>🤖 Détails des modèles</h2>
            <div id="modelsDetails"></div>
        </div>

        <!-- Historique -->
        <div class="card">
            <h2>📜 Historique</h2>
            <div class="history-controls">
                <button id="loadHistory" class="btn-secondary">Charger l'historique</button>
                <button id="resetMemory" class="btn-danger">Réinitialiser</button>
            </div>
            <div id="historyData" class="history-table"></div>
        </div>
    </div>

    <script>
        // Utilisez l'URL de production pour Render
        const API_URL = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
            ? "http://127.0.0.1:8000"
            : "https://multiplicateur-predictor.onrender.com";

        // Fonction pour appeler l'API
        async function callAPI(endpoint, method = "GET", body = null) {
            const options = { method, headers: { "Content-Type": "application/json" } };
            if (body) options.body = JSON.stringify(body);

            try {
                const response = await fetch(`${API_URL}${endpoint}`, options);
                if (!response.ok) throw new Error(`Erreur ${response.status}: ${response.statusText}`);
                return await response.json();
            } catch (error) {
                console.error("Erreur API:", error);
                showError(error.message);
                return null;
            }
        }

        // Afficher une erreur
        function showError(message) {
            const warningsEl = document.getElementById("warnings");
            warningsEl.innerHTML = `<p class="error">❌ ${message}</p>`;
            warningsEl.style.display = "block";
        }

        // Formulaire de prédiction
        document.getElementById("predictForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const input = document.getElementById("valuesInput").value;
            const values = input.split(",").map(v => parseFloat(v.trim())).filter(v => !isNaN(v));

            if (values.length === 0) {
                showError("Veuillez entrer des valeurs valides (ex: 1.5, 2.0, 1.8)");
                return;
            }

            const data = { values };
            const result = await callAPI("/predict", "POST", data);

            if (result) {
                displayResults(result);
            }
        });

        // Afficher les résultats
        function displayResults(result) {
            const resultsCard = document.getElementById("resultsCard");
            const modelsCard = document.getElementById("modelsCard");

            // Affiche les cartes
            resultsCard.style.display = "block";
            modelsCard.style.display = "block";

            // Prédictions et confiances
            document.getElementById("predictions").textContent = `[${result.predictions.join(", ")}]`;
            document.getElementById("confidences").textContent = `[${result.confidences.join(", ")}]`;

            // Top Features
            const features = result.top_features;
            document.getElementById("lastValue").textContent = features.last_value || "N/A";
            document.getElementById("meanValue").textContent = features.mean || "N/A";

            // Warnings
            const warningsEl = document.getElementById("warnings");
            if (result.warnings.length > 0) {
                warningsEl.innerHTML = `<p class="warning">⚠️ ${result.warnings.join(", ")}</p>`;
            } else {
                warningsEl.innerHTML = `<p class="success">✅ Aucune alerte</p>`;
            }
            warningsEl.style.display = "block";

            // Détails des modèles
            displayModelsDetails(result.top_features.models);

            // Graphique
            displayChart(result.predictions, result.confidences);

            // Historique
            await loadHistory();
        }

        // Afficher les détails des modèles
        function displayModelsDetails(models) {
            const container = document.getElementById("modelsDetails");
            let html = `<div class="models-grid">`;

            for (const [name, data] of Object.entries(models)) {
                html += `
                    <div class="model-card">
                        <h3>${name.toUpperCase()}</h3>
                        <p><strong>Poids:</strong> ${data.weight}</p>
                        <p><strong>Prédictions:</strong> [${data.predictions.join(", ")}]</p>
                        <p><strong>Confiances:</strong> [${data.confidences.join(", ")}]</p>
                    </div>
                `;
            }

            html += `</div>`;
            container.innerHTML = html;
        }

        // Afficher le graphique
        function displayChart(predictions, confidences) {
            const ctx = document.getElementById("chart").getContext("2d");
            if (window.chart) window.chart.destroy();

            window.chart = new Chart(ctx, {
                type: "bar",
                data: {
                    labels: predictions.map((_, i) => `Prédiction ${i + 1}`),
                    datasets: [
                        {
                            label: "Valeurs prédites",
                            data: predictions,
                            backgroundColor: [
                                "rgba(76, 175, 80, 0.7)",  // Vert
                                "rgba(33, 150, 243, 0.7)", // Bleu
                                "rgba(255, 193, 7, 0.7)"   // Orange
                            ],
                            borderColor: [
                                "rgba(76, 175, 80, 1)",
                                "rgba(33, 150, 243, 1)",
                                "rgba(255, 193, 7, 1)"
                            ],
                            borderWidth: 1
                        },
                        {
                            label: "Confiances",
                            data: confidences,
                            type: "line",
                            borderColor: "rgba(255, 99, 132, 1)",
                            backgroundColor: "rgba(255, 99, 132, 0.2)",
                            borderWidth: 2,
                            fill: false,
                            tension: 0.4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { beginAtZero: false }
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) label += ': ';
                                    label += context.parsed.y;
                                    return label;
                                }
                            }
                        }
                    }
                }
            });
        }

        // Charger l'historique
        async function loadHistory() {
            const result = await callAPI("/history");
            if (result) {
                const historyData = document.getElementById("historyData");
                if (result.history.length === 0) {
                    historyData.innerHTML = "<p>Aucune donnée dans l'historique.</p>";
                    return;
                }

                let html = `
                    <table>
                        <thead>
                            <tr>
                                <th>Index</th>
                                <th>Valeur</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                result.history.forEach((value, index) => {
                    html += `
                        <tr>
                            <td>${index + 1}</td>
                            <td>${value}</td>
                        </tr>
                    `;
                });

                html += `
                        </tbody>
                    </table>
                    <p><strong>Total:</strong> ${result.count} valeurs</p>
                `;

                historyData.innerHTML = html;
            }
        }

        // Réinitialiser la mémoire
        document.getElementById("loadHistory").addEventListener("click", loadHistory);
        document.getElementById("resetMemory").addEventListener("click", async () => {
            const result = await callAPI("/reset", "POST");
            if (result) {
                document.getElementById("historyData").innerHTML = "<p>Mémoire réinitialisée !</p>";
                document.getElementById("resultsCard").style.display = "none";
                document.getElementById("modelsCard").style.display = "none";
                showError("✅ Mémoire réinitialisée avec succès !");
            }
        });

        // Charger l'historique au démarrage
        document.addEventListener("DOMContentLoaded", loadHistory);
    </script>
</body>
</html>
